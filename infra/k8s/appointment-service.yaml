apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: hms
spec:
  replicas: 1              # DO NOT increase for SQLite - data consistency
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: appointment-service:latest
          imagePullPolicy: Never    # because we built inside Minikube
          ports:
            - containerPort: 5003
          envFrom:
            - configMapRef:
                name: hms-config
            - secretRef:
                name: hms-secret
          # Liveness and readiness probes using the /health endpoint
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: appointment-db-storage
              mountPath: /app/data         
      volumes:
        - name: appointment-db-storage
          persistentVolumeClaim:
            claimName: appointment-db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: hms
spec:
  selector:
    app: appointment-service
  ports:
    - port: 5003
      targetPort: 5003
  type: ClusterIP      # internal only