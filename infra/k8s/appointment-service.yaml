apiVersion: v1
kind: ConfigMap
metadata:
  name: appointment-service-config
data:
  PORT: "5003"
  DATA_DIR: "/data/db"
  CSV_DIR: "/data/csvs"
  PATIENT_SERVICE_URL: "http://patient-service:5001"
  DOCTOR_SERVICE_URL: "http://doctor-schedule-service:5002"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  labels:
    app: appointment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: appointment-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5003
          envFrom:
            - configMapRef:
                name: appointment-service-config
          volumeMounts:
            - name: db-storage
              mountPath: /data/db
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: db-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
spec:
  type: NodePort
  selector:
    app: appointment-service
  ports:
    - port: 5003
      targetPort: 5003
      nodePort: 30003
