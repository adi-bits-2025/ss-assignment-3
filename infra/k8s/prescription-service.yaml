apiVersion: v1
kind: ConfigMap
metadata:
  name: prescription-service-config
data:
  PORT: "5004"
  DATA_DIR: "/data/db"
  CSV_DIR: "/data/csvs"
  APPOINTMENT_SERVICE_URL: "http://appointment-service:5003"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prescription-service
  labels:
    app: prescription-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prescription-service
  template:
    metadata:
      labels:
        app: prescription-service
    spec:
      containers:
        - name: prescription-service
          image: prescription-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5004
          envFrom:
            - configMapRef:
                name: prescription-service-config
          volumeMounts:
            - name: db-storage
              mountPath: /data/db
          livenessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: db-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prescription-service
spec:
  type: NodePort
  selector:
    app: prescription-service
  ports:
    - port: 5004
      targetPort: 5004
      nodePort: 30004
