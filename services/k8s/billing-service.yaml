apiVersion: v1
kind: ConfigMap
metadata:
  name: billing-service-config
data:
  PORT: "5005"
  DATA_DIR: "/data/db"
  PATIENT_SERVICE_URL: "http://patient-service:5001"
  APPOINTMENT_SERVICE_URL: "http://appointment-service:5003"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  labels:
    app: billing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
        - name: billing-service
          image: billing-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5005
          envFrom:
            - configMapRef:
                name: billing-service-config
          volumeMounts:
            - name: db-storage
              mountPath: /data/db
          livenessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: db-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
spec:
  type: NodePort
  selector:
    app: billing-service
  ports:
    - port: 5005
      targetPort: 5005
      nodePort: 30005
