apiVersion: v1
kind: ConfigMap
metadata:
  name: patient-service-config
data:
  PORT: "5001"
  DATA_DIR: "/data/db"
  CSV_DIR: "/data/csvs"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  labels:
    app: patient-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: patient-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: patient-service-config
          volumeMounts:
            - name: db-storage
              mountPath: /data/db
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: db-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
spec:
  type: NodePort
  selector:
    app: patient-service
  ports:
    - port: 5001
      targetPort: 5001
      nodePort: 30001
