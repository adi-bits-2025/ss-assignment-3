apiVersion: v1
kind: ConfigMap
metadata:
  name: doctor-schedule-service-config
data:
  PORT: "5002"
  DATA_DIR: "/data/db"
  CSV_DIR: "/data/csvs"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-schedule-service
  labels:
    app: doctor-schedule-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctor-schedule-service
  template:
    metadata:
      labels:
        app: doctor-schedule-service
    spec:
      containers:
        - name: doctor-schedule-service
          image: doctor-schedule-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5002
          envFrom:
            - configMapRef:
                name: doctor-schedule-service-config
          volumeMounts:
            - name: db-storage
              mountPath: /data/db
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: db-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: doctor-schedule-service
spec:
  type: NodePort
  selector:
    app: doctor-schedule-service
  ports:
    - port: 5002
      targetPort: 5002
      nodePort: 30002
